name: 'Password Reset'
description: ''
endpoints:
  -
    custom: []
    httpMethods:
      - POST
    uri: api/forgot-password
    metadata:
      custom: []
      groupName: 'Password Reset'
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'Forgot password'
      description: |-
        Sends a password reset email with a tokenized link to the account's
        registered email. Works for any supported account type (freelancer or
        employer); if the same email is registered as more than one type, each
        matching account receives its own link. Tokens expire in 1 hour.
        Rate limited to 3 requests per minute.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      email:
        custom: []
        name: email
        description: "The account's registered email."
        required: true
        example: john@gmail.com
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanBodyParameters:
      email: john@gmail.com
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: '{"message":"Reset link sent","success":true}'
        headers: []
        description: Sent
      -
        custom: []
        status: 422
        content: '{"message":"The selected email is invalid.","errors":{"email":["The selected email is invalid."]}}'
        headers: []
        description: 'Email not found'
      -
        custom: []
        status: 429
        content: '{"message":"Too Many Attempts."}'
        headers: []
        description: 'Rate limited'
      -
        custom: []
        status: 500
        content: '{"message":"Failed to process request","success":false}'
        headers: []
        description: 'Server error'
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - POST
    uri: api/reset-password
    metadata:
      custom: []
      groupName: 'Password Reset'
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'Reset password'
      description: |-
        Resets an account's password using a valid token from the reset email.
        The correct account type is resolved automatically by matching the token
        against each supported account's reset table, so the client only needs to
        send the email, token, and new password. Token must not be expired
        (1 hour TTL). Tokens are hashed and verified with Hash::check.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      token:
        custom: []
        name: token
        description: 'The reset token from the email link.'
        required: true
        example: aBcDeFgHiJkLmNoPqRsTuVwXyZ123456789012345678901234567890abcd
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      email:
        custom: []
        name: email
        description: "The account's email."
        required: true
        example: john@gmail.com
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      password:
        custom: []
        name: password
        description: 'New password (min 8 chars).'
        required: true
        example: NewPassword1!
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      password_confirmation:
        custom: []
        name: password_confirmation
        description: 'Must match password.'
        required: true
        example: NewPassword1!
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanBodyParameters:
      token: aBcDeFgHiJkLmNoPqRsTuVwXyZ123456789012345678901234567890abcd
      email: john@gmail.com
      password: NewPassword1!
      password_confirmation: NewPassword1!
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: '{"message":"Password updated successfully","success":true}'
        headers: []
        description: Success
      -
        custom: []
        status: 422
        content: '{"message":"Invalid or expired token","success":false}'
        headers: []
        description: 'Invalid token'
      -
        custom: []
        status: 422
        content: '{"message":"Token expired","success":false}'
        headers: []
        description: 'Expired token'
      -
        custom: []
        status: 422
        content: '{"message":"Account not found","success":false}'
        headers: []
        description: 'Account not found'
      -
        custom: []
        status: 500
        content: '{"message":"Reset failed","success":false}'
        headers: []
        description: 'Server error'
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
